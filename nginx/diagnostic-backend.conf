# Nginx configuration for Diagnostic Backend
# TLS termination + reverse proxy to the Node.js app on 127.0.0.1:4000.
#
# Install:
#   sudo cp nginx/diagnostic-backend.conf /etc/nginx/sites-available/api.bomoko.fund.conf
#   sudo ln -sf /etc/nginx/sites-available/api.bomoko.fund.conf \
#               /etc/nginx/sites-enabled/api.bomoko.fund.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: obtain a Let's Encrypt certificate with:
#   sudo certbot --nginx -d api.bomoko.fund

# --- Upstream: the PM2-managed Node process ---
upstream diagnostic_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

# --- Default server: refuse requests for unknown hostnames (e.g. raw IP scans) ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

# --- HTTP: serve ACME challenge, redirect everything else to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name api.bomoko.fund;

    # Let's Encrypt http-01 challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: reverse proxy to Node ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.bomoko.fund;

    # Certbot will populate these. Until the cert exists, comment them out
    # and let `certbot --nginx -d api.bomoko.fund` add them automatically.
    ssl_certificate     /etc/letsencrypt/live/api.bomoko.fund/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bomoko.fund/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/api.bomoko.fund.access.log;
    error_log  /var/log/nginx/api.bomoko.fund.error.log;

    # Upload size (matches multer limits in the app)
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml;

    # Static uploads served straight from disk (skip Node)
    location /uploads/ {
        alias /var/www/diagnostic-backend/uploads/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";

        location ~* \.(php|pl|py|jsp|asp|sh|cgi)$ {
            deny all;
        }
    }

    # Lightweight health probe (no access log spam)
    location = /health {
        proxy_pass http://diagnostic_backend/test;
        access_log off;
    }

    # Main reverse proxy
    location / {
        proxy_pass http://diagnostic_backend;

        proxy_http_version 1.1;

        # WebSocket / upgrade support (harmless for plain HTTP)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers    16 8k;

        proxy_cache_bypass $http_upgrade;
    }

    # Nginx status (monitoring only)
    location = /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}

# Map for WebSocket Connection header (used above). Place in http{} context.
# If you already define this elsewhere, remove this block.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
